# Orchestrates the backend only (web + worker + Postgres + Redis).
# The frontend is intentionally out of scope here.

x-backend-env: &backend-env
  DEBUG: "True"
  SECRET_KEY: dev-insecure-secret-key-change-me
  ALLOWED_HOSTS: "*"
  DATABASE_URL: postgres://blog:blog@db:5432/blog
  REDIS_URL: redis://redis:6379/0

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blog
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Host 5433 -> container 5432, to avoid colliding with a native
      # PostgreSQL that may already own host port 5432.
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "1"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    command: celery -A config worker -l info
    environment:
      <<: *backend-env
      RUN_MIGRATIONS: "0"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
